services:
  - type: web
    name: soms-backend
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn config.wsgi --log-file -
    envVars:
      - key: SECRET_KEY
        scope: run
        value: change-me-in-production
      - key: DEBUG
        scope: run
        value: 'False'
      - key: ALLOWED_HOSTS
        scope: run
        value: soms-backend.onrender.com
      - key: DATABASE_URL
        scope: run
        fromDatabase:
          name: soms-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        scope: run
        value: https://soms-frontend.onrender.com

  - type: web
    name: soms-frontend
    env: node
    region: ohio
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: VITE_API_URL
        scope: run
        value: https://soms-backend.onrender.com/api

databases:
  - name: soms-db
    plan: free
    region: ohio
